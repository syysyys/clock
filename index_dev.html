<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no,
               viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Digital Clock</title>

<style>
      html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
          font-family: 'Courier New', monospace;
          color: white;
      }
      
      #clock {
          font-size: 16vw;   /* ← 縦画面用 */
          letter-spacing: 0.08em;
          font-weight: 900;
          text-shadow: 0 0 20px rgba(255,255,255,0.3);
      }

      @media (orientation: landscape) {
          #clock {
              font-size: 30vh;  /* ← 横画面用 */
          }
      }

      .hud {
          display: grid;
          grid-template-rows: auto 1fr auto 20px;
          height: 100vh;
          padding: 20px;
      }

      .main-clock {
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .panels {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
      }

</style>
</head>

<body>

<div class="hud">

  <div class="header">
    <div class="title">PERSONAL CONTROL HUD</div>
    <div class="date" id="date"></div>
  </div>

  <div class="main-clock" id="clock">00:00:00</div>

  <div class="panels">

    <div class="panel">
      <div class="panel-title">SYS STATUS</div>
      <div id="uptime"></div>
      <div id="coretemp"></div>
    </div>

    <div class="panel">
      <div class="panel-title">TARGET T-</div>
      <div id="countdown"></div>
    </div>

  </div>

  <div class="second-bar">
    <div id="second-progress"></div>
  </div>

</div>

<script>
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent =
        `${hours}:${minutes}:${seconds}`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
